services:
  redis:
    image: redis:latest
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  redis_insight:
    image: redis/redisinsight:latest
    container_name: ecommerce-redis-ui
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/db
    restart: always
    depends_on:
      - redis

  smsdev:
    build:
      context: ./tools/smsdev
    container_name: ecommerce-smsdev
    ports:
      - "4000:4000"
      - "4001:4001"
    restart: always

volumes:
  redis_data:
  redis_insight_data:
