services:
  redis:
    image: redis:latest
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  redis_insight:
    image: redis/redisinsight:latest
    container_name: ecommerce-redis-ui
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/db
    restart: always
    depends_on:
      - redis

  smsdev:
    build:
      context: ./tools/smsdev
    container_name: ecommerce-smsdev
    ports:
      - "4000:4000"
      - "4001:4001"
    restart: always

  chatbot:
    build:
      context: ../chatbot
    container_name: ecommerce-chatbot
    ports:
      - "8000:8000"
    environment:
      ECOMMERCE_API_BASE_URL: http://host.docker.internal:8888/api/v1
      SQLITE_PATH: /app/data/chatbot.sqlite3
      CHROMA_PERSIST_DIR: /app/data/chroma
      CHROMA_COLLECTION: bagy_documents
      RETRIEVAL_PROVIDER: nvidia
      NVIDIA_RERANK_URL: https://ai.api.nvidia.com/v1/retrieval/nvidia/llama-nemotron-rerank-1b-v2/reranking
      REDIS_URL: redis://redis:6379/1
    volumes:
      - chatbot_data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
  redis_insight_data:
  chatbot_data:
