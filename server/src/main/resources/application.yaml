server:
  port: ${SERVER_PORT:8888}

spring:
  application:
    name: ecommerce-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 500MB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 50

app:
  message:
    sms:
      sender-name: ${SMS_SENDER_NAME:BAGY}
      smsdev:
        base-url: ${SMSDEV_BASE_URL:http://localhost:4001}
  loyalty:
    points-per-vnd: 1000
  order:
    min-amount-for-freeship: 500000
  shipping:
    ghn:
      base-url: ${GHN_BASE_URL:https://dev-online-gateway.ghn.vn}
      token: ${GHN_TOKEN:7154b80d-22ea-11f1-a973-aee5264794df}
      shop-id: ${GHN_SHOP_ID:199629}
      from-district-id: 1542
      sender-name: "BAGY Hà Nội"
      sender-phone: "0900000001"
      sender-address: "7 Khương Hạ"
